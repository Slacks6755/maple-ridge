[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect non-www to www (prevents duplicate content in search engines)
[[redirects]]
  from = "https://mapleridgedev.com/*"
  to = "https://www.mapleridgedev.com/:splat"
  status = 301
  force = true

# Old city+service combo URLs collapse to the city page
[[redirects]]
  from = "/service-areas/:area/:service"
  to = "/service-areas/:area"
  status = 301

# Old services hub page (removed) goes home
[[redirects]]
  from = "/services"
  to = "/"
  status = 301
